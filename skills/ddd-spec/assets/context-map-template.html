<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domain Context Map</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ajv/8.17.1/ajv2020.bundle.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; }

  /* Layout */
  #app { display: flex; flex-direction: column; height: 100vh; }
  header {
    background: #16213e;
    border-bottom: 1px solid #0f3460;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  header h1 { font-size: 14px; font-weight: 600; color: #f5c518; white-space: nowrap; }
  #breadcrumb { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; font-size: 12px; }
  #breadcrumb .crumb { color: #4a90d9; cursor: pointer; }
  #breadcrumb .crumb:hover { text-decoration: underline; }
  #breadcrumb .crumb.current { color: #f5c518; cursor: default; pointer-events: none; }
  #breadcrumb .sep { color: #555; }
  #btn-back {
    margin-left: auto;
    background: #0f3460;
    border: 1px solid #4a90d9;
    color: #4a90d9;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    white-space: nowrap;
  }
  #btn-back:hover { background: #1a4a7a; }
  #btn-back:disabled { opacity: 0.3; cursor: default; }

  #layout { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  aside#sidebar {
    width: 220px;
    flex-shrink: 0;
    background: #16213e;
    border-right: 1px solid #0f3460;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #search {
    margin: 10px 8px 6px;
    padding: 6px 8px;
    background: #0f3460;
    border: 1px solid #1a4a7a;
    border-radius: 4px;
    color: #e0e0e0;
    font-size: 12px;
    outline: none;
  }
  #search::placeholder { color: #666; }
  #search:focus { border-color: #4a90d9; }
  #domain-list { list-style: none; overflow-y: auto; flex: 1; padding: 4px 0; }
  #domain-list li {
    font-size: 12px;
    cursor: pointer;
    border-left: 3px solid transparent;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: #bbb;
  }
  #domain-list li:hover { background: #0f3460; color: #e0e0e0; }
  #domain-list li.active { border-left-color: #f5c518; color: #f5c518; background: #0f3460; }
  #domain-list .tree-label {
    display: flex;
    align-items: center;
    padding: 5px 8px;
  }
  #domain-list .tree-toggle {
    width: 14px;
    flex-shrink: 0;
    font-size: 9px;
    color: #555;
    text-align: center;
    cursor: pointer;
    user-select: none;
  }
  #domain-list .tree-toggle:hover { color: #aaa; }
  #domain-list .tree-toggle.leaf { visibility: hidden; }
  #domain-list .tree-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
  #domain-list .tree-children { display: block; }
  #domain-list .tree-children.collapsed { display: none; }
  #domain-list li[data-depth="0"] .tree-label { padding-left: 8px; }
  #domain-list li[data-depth="1"] .tree-label { padding-left: 20px; }
  #domain-list li[data-depth="2"] .tree-label { padding-left: 32px; }
  #domain-list li[data-depth="3"] .tree-label { padding-left: 44px; }
  #domain-list li[data-depth="4"] .tree-label { padding-left: 56px; }

  /* Main content */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #graph-wrap { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  #cy { min-height: 100px; flex-shrink: 0; background: #0d1117; }
  #info-panel { flex: 1; min-height: 60px; overflow-y: auto; padding: 16px 20px; background: #12192b; }

  /* Info panel */
  #info-panel .domain-title { font-size: 18px; font-weight: 700; color: #f5c518; margin-bottom: 4px; }
  #info-panel .domain-meta { font-size: 11px; color: #888; margin-bottom: 10px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  #info-panel .tag {
    background: #1a4a7a;
    color: #8ab4f8;
    padding: 2px 7px;
    border-radius: 10px;
    font-size: 10px;
  }
  #info-panel .description { font-size: 13px; color: #ccc; line-height: 1.6; margin-bottom: 14px; }

  .section-header {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: #888;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 0;
    border-bottom: 1px solid #1e2d4a;
    margin-bottom: 6px;
    user-select: none;
  }
  .section-header .arrow { font-size: 9px; transition: transform 0.15s; }
  .section-header.collapsed .arrow { transform: rotate(-90deg); }
  .section-body { margin-bottom: 14px; }
  .section-body.hidden { display: none; }

  .lang-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .lang-table td { padding: 4px 6px; vertical-align: top; border-bottom: 1px solid #1e2d4a; }
  .lang-table td:first-child { color: #f5c518; font-weight: 600; width: 30%; white-space: nowrap; }
  .lang-table td:last-child { color: #ccc; }

  .issue-summary { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .issue-badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge-critical { background: #5a1a1a; color: #ff6b6b; }
  .badge-high { background: #3d2200; color: #ff9f43; }
  .badge-medium { background: #2d2a00; color: #ffd32a; }
  .badge-low { background: #0d2d1a; color: #2ed573; }

  .issue-item {
    background: #0f1a2e;
    border: 1px solid #1e2d4a;
    border-radius: 4px;
    padding: 8px 10px;
    margin-bottom: 6px;
    font-size: 12px;
  }
  .issue-item .issue-cat { font-size: 10px; color: #888; margin-bottom: 3px; }
  .issue-item .issue-rec { color: #ccc; }
  .issue-item .issue-ev { color: #666; font-style: italic; margin-top: 3px; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .code-loc { display: flex; gap: 8px; font-size: 12px; padding: 4px 0; border-bottom: 1px solid #1a2540; align-items: baseline; }
  .code-loc .loc-path { color: #4a90d9; font-family: monospace; }
  .code-loc .loc-type { color: #888; font-size: 10px; }

  .empty-msg { color: #555; font-size: 12px; font-style: italic; }

  /* Invariants */
  .invariant { font-size: 11px; color: #e67e22; padding: 2px 0; font-style: italic; }

  /* Neighbor lists */
  .neighbor-item { display: flex; gap: 8px; font-size: 12px; padding: 4px 0; border-bottom: 1px solid #1a2540; align-items: baseline; flex-wrap: wrap; }
  .neighbor-item .nb-name { color: #4a90d9; cursor: pointer; }
  .neighbor-item .nb-name:hover { text-decoration: underline; }
  .neighbor-item .nb-rel { color: #888; font-size: 11px; }
  .neighbor-item .nb-port { color: #555; font-size: 10px; font-family: monospace; }
  .neighbor-item .nb-type-label { font-size: 10px; padding: 1px 5px; border-radius: 8px; white-space: nowrap; }
  .nb-client { background: #1a3a5c; color: #4a90d9; }
  .nb-subdomain { background: #1a3d1a; color: #5cb85c; }
  .nb-kernel { background: #2d1a3d; color: #9b59b6; }
  .nb-adjacent { background: #3d2a00; color: #e67e22; }
  .nb-external { background: #2a2a2a; color: #888; }

  /* Ports */
  .port-item { background: #0f1a2e; border: 1px solid #1e2d4a; border-radius: 4px; padding: 8px 10px; margin-bottom: 6px; font-size: 12px; }
  .port-item .port-header { display: flex; gap: 8px; align-items: center; margin-bottom: 3px; }
  .port-item .port-dir { font-size: 10px; padding: 1px 5px; border-radius: 8px; }
  .port-dir.inbound { background: #1a3a5c; color: #4a90d9; }
  .port-dir.outbound { background: #1a3d1a; color: #5cb85c; }
  .port-item .port-name { color: #f5c518; font-weight: 600; }
  .port-item .port-contract { color: #ccc; font-family: monospace; font-size: 11px; }
  .port-item .port-protocol { color: #666; font-size: 10px; }
  .port-item .port-refs { color: #555; font-size: 10px; }

  /* Source material */
  .source-item { display: flex; gap: 8px; font-size: 12px; padding: 3px 0; border-bottom: 1px solid #1a2540; }
  .source-item .src-type { font-size: 10px; padding: 1px 5px; border-radius: 8px; background: #1a2540; color: #8ab4f8; }
  .source-item .src-ref { color: #ccc; }

  /* Implementation guidance */
  .guidance-row { display: flex; gap: 8px; font-size: 12px; padding: 3px 0; }
  .guidance-row .guide-label { color: #888; width: 120px; flex-shrink: 0; }
  .guidance-row .guide-value { color: #ccc; }

  /* Events and rules */
  .event-item { background: #0f1a2e; border: 1px solid #1e2d4a; border-radius: 4px; padding: 8px 10px; margin-bottom: 6px; font-size: 12px; }
  .event-item .event-name { color: #f5c518; font-weight: 600; margin-bottom: 2px; }
  .event-item .event-detail { color: #888; font-size: 11px; }
  .rule-item { font-size: 12px; color: #ccc; padding: 3px 0; border-bottom: 1px solid #1a2540; }

  /* Legend */
  #legend {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    padding: 6px 10px;
    background: #0d1117;
    border-bottom: 1px solid #0f3460;
    font-size: 11px;
    flex-shrink: 0;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; color: #aaa; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-diamond { width: 10px; height: 10px; transform: rotate(45deg); flex-shrink: 0; }
  .legend-rect { width: 12px; height: 8px; flex-shrink: 0; }

  /* Drag handles */
  #sidebar-handle {
    width: 5px;
    flex-shrink: 0;
    background: #0f3460;
    cursor: col-resize;
    transition: background 0.15s;
  }
  #sidebar-handle:hover, #sidebar-handle.active { background: #4a90d9; }
  #graph-handle {
    height: 5px;
    flex-shrink: 0;
    background: #0f3460;
    cursor: row-resize;
    transition: background 0.15s;
  }
  #graph-handle:hover, #graph-handle.active { background: #4a90d9; }
  body.dragging-col { user-select: none; cursor: col-resize !important; }
  body.dragging-row { user-select: none; cursor: row-resize !important; }
  body.dragging-col *, body.dragging-row * { cursor: inherit !important; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Domain Context Map</h1>
    <div id="breadcrumb"></div>
    <button id="btn-back" disabled>&#8592; Back</button>
  </header>
  <div id="layout">
    <aside id="sidebar">
      <input id="search" type="text" placeholder="Search domains…" autocomplete="off">
      <ul id="domain-list"></ul>
    </aside>
    <div id="sidebar-handle"></div>
    <div id="main">
      <div id="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#4a90d9"></div>Client</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f5c518;border:2px solid #f5c518"></div>Current</div>
        <div class="legend-item"><div class="legend-dot" style="background:#5cb85c"></div>Subdomain</div>
        <div class="legend-item"><div class="legend-diamond" style="background:#9b59b6"></div>Kernel</div>
        <div class="legend-item"><div class="legend-dot" style="background:#e67e22"></div>Adjacent</div>
        <div class="legend-item"><div class="legend-rect" style="background:#888"></div>External</div>
      </div>
      <div id="graph-wrap">
        <div id="cy"></div>
        <div id="graph-handle"></div>
        <div id="info-panel"><div class="empty-msg">Select a domain to view details.</div></div>
      </div>
    </div>
  </div>
</div>

<script>
const RDOD_DATA = __RDOD_DATA_PLACEHOLDER__;
const RDOD_SCHEMA = __RDOD_SCHEMA_PLACEHOLDER__;

// ── Schema Validation ────────────────────────────────────────────────────────

(function validateSchema() {
  if (typeof Ajv2020 === 'undefined') {
    console.warn('[RDOD] AJV not loaded — schema validation skipped');
    return;
  }
  try {
    const ajv = new Ajv2020({ allErrors: true });
    const validate = ajv.compile(RDOD_SCHEMA);
    const valid = validate(RDOD_DATA);
    if (valid) {
      console.log(`[RDOD] Schema validation passed (${Object.keys(RDOD_DATA).length} domains)`);
    } else {
      console.warn(`[RDOD] Schema validation found ${validate.errors.length} issue(s):`);
      validate.errors.slice(0, 20).forEach(err => {
        console.warn(`  ${err.instancePath || '/'}: ${err.message}`);
      });
    }
  } catch (e) {
    console.warn('[RDOD] Schema validation error:', e.message);
  }
})();

// ── Helpers ──────────────────────────────────────────────────────────────────

function stripPrefix(ref) {
  if (!ref) return ref;
  return String(ref).replace(/^[a-z-]+:\/\//, '');
}

function getDomain(id) {
  const clean = stripPrefix(id);
  return RDOD_DATA[clean] || null;
}

function allDomains() {
  return Object.values(RDOD_DATA);
}

function getList(domain, key) {
  const v = domain[key];
  if (!v) return [];
  if (Array.isArray(v)) return v.map(x => typeof x === 'string' ? x : (x.ref || x.id || '')).filter(Boolean);
  return [];
}

// ── State ────────────────────────────────────────────────────────────────────

let currentId = null;
let navHistory = [];
let cy = null;

// ── Navigation ───────────────────────────────────────────────────────────────

function navigateTo(id) {
  const clean = stripPrefix(id);
  if (currentId) navHistory.push(currentId);
  currentId = clean;
  renderSidebar();
  renderBreadcrumb();
  const domain = getDomain(clean);
  if (domain) {
    renderGraph(domain);
    renderInfo(domain);
  } else {
    renderGraph(null);
    renderInfo(null);
  }
  document.getElementById('btn-back').disabled = navHistory.length === 0;
}

function goBack() {
  if (navHistory.length === 0) return;
  const prev = navHistory.pop();
  currentId = null; // prevent push in navigateTo
  const saved = navHistory.slice();
  navigateTo(prev);
  navHistory = saved; // restore — navigateTo pushed again
  navHistory.pop();   // undo the extra push
  document.getElementById('btn-back').disabled = navHistory.length === 0;
}

document.getElementById('btn-back').addEventListener('click', goBack);

// ── Sidebar ───────────────────────────────────────────────────────────────────

// Build a tree from subdomain relationships.
// A domain's parent is whoever lists it in their subdomains.
// Domains with no parent are roots. Adjacents don't affect the tree.

function buildTree() {
  const childToParent = {};  // childId → parentId
  const parentToChildren = {}; // parentId → [childIds]

  allDomains().forEach(d => {
    const parentId = stripPrefix(d.id);
    const subs = getList(d, 'subdomains');
    subs.forEach(ref => {
      const childId = stripPrefix(ref);
      if (getDomain(childId)) {
        childToParent[childId] = parentId;
        if (!parentToChildren[parentId]) parentToChildren[parentId] = [];
        parentToChildren[parentId].push(childId);
      }
    });
  });

  // Roots: domains that are no one's subdomain
  const roots = Object.keys(RDOD_DATA)
    .filter(id => !childToParent[id])
    .sort();

  return { roots, parentToChildren };
}

let collapsedNodes = new Set();

function renderSidebar(filter) {
  const list = document.getElementById('domain-list');
  list.innerHTML = '';
  const q = (filter || '').toLowerCase();

  if (q) {
    // Search mode: flat filtered list
    const items = allDomains()
      .filter(d => (d.id || '').toLowerCase().includes(q) || (d.name || '').toLowerCase().includes(q))
      .sort((a, b) => (a.id || '').localeCompare(b.id || ''));

    items.forEach(d => {
      const li = document.createElement('li');
      const clean = stripPrefix(d.id);
      li.setAttribute('data-depth', '0');
      const label = document.createElement('div');
      label.className = 'tree-label';
      const nameSpan = document.createElement('span');
      nameSpan.className = 'tree-name';
      nameSpan.textContent = d.name || clean;
      label.appendChild(nameSpan);
      li.appendChild(label);
      li.title = clean;
      if (clean === currentId) li.classList.add('active');
      li.addEventListener('click', () => navigateTo(d.id));
      list.appendChild(li);
    });
    return;
  }

  // Tree mode: hierarchical view
  const { roots, parentToChildren } = buildTree();

  function renderNode(id, depth) {
    const d = getDomain(id);
    if (!d) return;
    const children = (parentToChildren[id] || []).sort();
    const hasChildren = children.length > 0;
    const isCollapsed = collapsedNodes.has(id);

    const li = document.createElement('li');
    li.setAttribute('data-depth', Math.min(depth, 4));

    const label = document.createElement('div');
    label.className = 'tree-label';

    const toggle = document.createElement('span');
    toggle.className = 'tree-toggle' + (hasChildren ? '' : ' leaf');
    toggle.textContent = hasChildren ? (isCollapsed ? '▶' : '▼') : '';
    if (hasChildren) {
      toggle.addEventListener('click', (e) => {
        e.stopPropagation();
        if (collapsedNodes.has(id)) collapsedNodes.delete(id);
        else collapsedNodes.add(id);
        renderSidebar();
      });
    }

    const nameSpan = document.createElement('span');
    nameSpan.className = 'tree-name';
    nameSpan.textContent = d.name || id;

    label.appendChild(toggle);
    label.appendChild(nameSpan);
    li.appendChild(label);
    li.title = id;
    if (id === currentId) li.classList.add('active');
    li.addEventListener('click', (e) => {
      if (e.target.classList.contains('tree-toggle')) return;
      navigateTo(d.id);
    });
    list.appendChild(li);

    if (hasChildren && !isCollapsed) {
      children.forEach(childId => renderNode(childId, depth + 1));
    }
  }

  roots.forEach(id => renderNode(id, 0));
}

document.getElementById('search').addEventListener('input', e => {
  renderSidebar(e.target.value);
});

// ── Breadcrumb ────────────────────────────────────────────────────────────────

function renderBreadcrumb() {
  const el = document.getElementById('breadcrumb');
  el.innerHTML = '';
  const all = [...navHistory, currentId];
  all.forEach((id, i) => {
    if (i > 0) {
      const sep = document.createElement('span');
      sep.className = 'sep';
      sep.textContent = '›';
      el.appendChild(sep);
    }
    const span = document.createElement('span');
    const d = getDomain(id);
    span.className = 'crumb' + (i === all.length - 1 ? ' current' : '');
    span.textContent = (d && d.name) ? d.name : id;
    span.title = id;
    if (i < all.length - 1) {
      span.addEventListener('click', () => {
        // Jump to this crumb: restore history up to i
        const targetHistory = all.slice(0, i);
        navHistory = targetHistory;
        currentId = null;
        navigateTo(id);
        navHistory = targetHistory;
      });
    }
    el.appendChild(span);
  });
}

// ── Graph ─────────────────────────────────────────────────────────────────────

function buildElements(domain) {
  const nodes = [];
  const edges = [];

  const cx = 500, cy2 = 350;
  const currentClean = stripPrefix(domain.id);

  nodes.push({
    data: { id: currentClean, label: domain.name || currentClean, nodeType: 'current' },
    position: { x: cx, y: cy2 }
  });

  function spread(ids, baseX, baseY, axis) {
    const N = ids.length;
    const delta = N > 8 ? 80 : N > 5 ? 90 : 140;
    ids.forEach((ref, i) => {
      const id = stripPrefix(ref);
      const offset = (i - (N - 1) / 2) * delta;
      const pos = axis === 'x'
        ? { x: baseX, y: baseY + offset }
        : { x: baseX + offset, y: baseY };
      const d = getDomain(id);
      nodes.push({
        data: { id, label: (d && d.name) || id, nodeType: axis === 'x' ? '_side' : '_row' }
      });
      // will override nodeType below
      nodes[nodes.length - 1].data.nodeType = '_pending';
      nodes[nodes.length - 1].position = pos;
    });
  }

  const clients = getList(domain, 'domain_clients');
  const subdomains = getList(domain, 'subdomains');
  const kernels = getList(domain, 'kernels');
  const adjacents = (domain.adjacents || []).map(a => typeof a === 'string' ? { ref: a } : a);
  const externals = getList(domain, 'externals');

  const clientY = clients.length > 0 ? cy2 - 190 : cy2;
  const subY = cy2 + 190;
  const extY = cy2 + 310;
  const kernelX = cx - 270;
  const adjX = cx + 270;

  // Clients (top)
  const Nc = clients.length;
  clients.forEach((ref, i) => {
    const id = stripPrefix(ref);
    const delta = Nc > 8 ? 80 : Nc > 5 ? 90 : 140;
    const d = getDomain(id);
    nodes.push({
      data: { id, label: (d && d.name) || id, nodeType: 'client' },
      position: { x: cx + (i - (Nc - 1) / 2) * delta, y: clientY }
    });
    edges.push({ data: { source: id, target: currentClean, edgeType: 'client' } });
  });

  // Subdomains (bottom)
  const Ns = subdomains.length;
  subdomains.forEach((ref, i) => {
    const id = stripPrefix(ref);
    const delta = Ns > 8 ? 80 : Ns > 5 ? 90 : 140;
    const d = getDomain(id);
    nodes.push({
      data: { id, label: (d && d.name) || id, nodeType: 'subdomain' },
      position: { x: cx + (i - (Ns - 1) / 2) * delta, y: subY }
    });
    edges.push({ data: { source: currentClean, target: id, edgeType: 'subdomain' } });
  });

  // Kernels (left)
  const Nk = kernels.length;
  kernels.forEach((ref, i) => {
    const id = stripPrefix(ref);
    const delta = Nk > 8 ? 80 : Nk > 5 ? 90 : 140;
    const d = getDomain(id);
    nodes.push({
      data: { id, label: (d && d.name) || id, nodeType: 'kernel' },
      position: { x: kernelX, y: cy2 + (i - (Nk - 1) / 2) * delta }
    });
    edges.push({ data: { source: currentClean, target: id, edgeType: 'kernel' } });
  });

  // Adjacents (right)
  const Na = adjacents.length;
  adjacents.forEach((adj, i) => {
    const id = stripPrefix(adj.ref || adj);
    const delta = Na > 8 ? 80 : Na > 5 ? 90 : 140;
    const d = getDomain(id);
    const isCross = (adj.pattern || '').toLowerCase().includes('cross');
    nodes.push({
      data: { id, label: (d && d.name) || id, nodeType: isCross ? 'adjacent-cross' : 'adjacent', pattern: adj.pattern || '' },
      position: { x: adjX, y: cy2 + (i - (Na - 1) / 2) * delta }
    });
    edges.push({ data: { source: currentClean, target: id, edgeType: 'adjacent', pattern: adj.pattern || '' } });
  });

  // Externals (far bottom)
  const Ne = externals.length;
  externals.forEach((ref, i) => {
    const id = stripPrefix(ref);
    const delta = Ne > 8 ? 80 : Ne > 5 ? 90 : 140;
    const d = getDomain(id);
    nodes.push({
      data: { id, label: (d && d.name) || id, nodeType: 'external' },
      position: { x: cx + (i - (Ne - 1) / 2) * delta, y: extY }
    });
    edges.push({ data: { source: currentClean, target: id, edgeType: 'external' } });
  });

  // Deduplicate nodes (a domain may appear in multiple roles)
  const seen = new Set();
  const dedupedNodes = nodes.filter(n => {
    if (seen.has(n.data.id)) return false;
    seen.add(n.data.id);
    return true;
  });

  return [...dedupedNodes, ...edges];
}

function renderGraph(domain) {
  const container = document.getElementById('cy');

  if (cy) { cy.destroy(); cy = null; }

  if (!domain) return;

  const elements = buildElements(domain);

  cy = cytoscape({
    container,
    elements,
    layout: { name: 'preset' },
    style: [
      // Base node
      {
        selector: 'node',
        style: {
          'label': 'data(label)',
          'font-size': '11px',
          'color': '#ffffff',
          'text-valign': 'bottom',
          'text-halign': 'center',
          'text-margin-y': 4,
          'text-wrap': 'wrap',
          'text-max-width': '80px',
          'width': 55,
          'height': 55,
        }
      },
      // Current
      {
        selector: 'node[nodeType="current"]',
        style: {
          'background-color': '#f5c518',
          'border-width': 3,
          'border-color': '#f5c518',
          'width': 80,
          'height': 80,
          'color': '#ffffff',
          'font-weight': 'bold',
        }
      },
      // Client
      {
        selector: 'node[nodeType="client"]',
        style: { 'background-color': '#4a90d9', 'border-width': 1, 'border-color': '#6aafff' }
      },
      // Subdomain
      {
        selector: 'node[nodeType="subdomain"]',
        style: { 'background-color': '#5cb85c', 'border-width': 1, 'border-color': '#7dd87d' }
      },
      // Kernel
      {
        selector: 'node[nodeType="kernel"]',
        style: {
          'background-color': '#9b59b6',
          'border-width': 1,
          'border-color': '#b980d4',
          'shape': 'diamond',
        }
      },
      // Adjacent
      {
        selector: 'node[nodeType="adjacent"]',
        style: {
          'background-color': '#e67e22',
          'border-width': 2,
          'border-color': '#ff9f43',
          'border-style': 'dashed',
        }
      },
      // Adjacent cross-cutting
      {
        selector: 'node[nodeType="adjacent-cross"]',
        style: {
          'background-color': '#e67e22',
          'border-width': 2,
          'border-color': '#ff9f43',
          'border-style': 'dotted',
        }
      },
      // External
      {
        selector: 'node[nodeType="external"]',
        style: {
          'background-color': '#555',
          'border-width': 1,
          'border-color': '#888',
          'shape': 'rectangle',
          'cursor': 'default',
        }
      },
      // Edges
      {
        selector: 'edge',
        style: {
          'width': 1.5,
          'line-color': '#444',
          'target-arrow-color': '#444',
          'curve-style': 'bezier',
        }
      },
      {
        selector: 'edge[edgeType="client"]',
        style: {
          'line-color': '#4a90d9',
          'target-arrow-color': '#4a90d9',
          'target-arrow-shape': 'triangle',
        }
      },
      {
        selector: 'edge[edgeType="subdomain"]',
        style: {
          'line-color': '#5cb85c',
          'target-arrow-color': '#5cb85c',
          'target-arrow-shape': 'triangle',
        }
      },
      {
        selector: 'edge[edgeType="kernel"]',
        style: {
          'line-color': '#9b59b6',
          'target-arrow-shape': 'none',
        }
      },
      {
        selector: 'edge[edgeType="adjacent"]',
        style: {
          'line-color': '#e67e22',
          'line-style': 'dashed',
          'target-arrow-shape': 'none',
          'mid-target-arrow-shape': 'none',
        }
      },
      {
        selector: 'edge[edgeType="external"]',
        style: {
          'line-color': '#666',
          'line-style': 'dotted',
          'target-arrow-shape': 'none',
        }
      },
    ],
    userPanningEnabled: true,
    userZoomingEnabled: true,
    minZoom: 0.3,
    maxZoom: 3,
  });

  cy.on('tap', 'node', e => {
    const d = e.target.data();
    const type = d.nodeType;
    if (['client', 'subdomain', 'adjacent', 'adjacent-cross'].includes(type)) {
      const target = getDomain(d.id);
      if (target) {
        navigateTo(d.id);
      } else {
        // Not in data — show tooltip
        e.target.flashClass('unknown-flash', 600);
      }
    }
  });

  cy.fit(undefined, 40);
}

// ── Info Panel ────────────────────────────────────────────────────────────────

function makeSection(title, content, startCollapsed) {
  const wrap = document.createElement('div');

  const header = document.createElement('div');
  header.className = 'section-header' + (startCollapsed ? ' collapsed' : '');
  header.innerHTML = `<span class="arrow">▼</span>${title}`;

  const body = document.createElement('div');
  body.className = 'section-body' + (startCollapsed ? ' hidden' : '');
  body.appendChild(content);

  header.addEventListener('click', () => {
    const collapsed = header.classList.toggle('collapsed');
    body.classList.toggle('hidden', collapsed);
  });

  wrap.appendChild(header);
  wrap.appendChild(body);
  return wrap;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function renderInfo(domain) {
  const panel = document.getElementById('info-panel');
  panel.innerHTML = '';

  if (!domain) {
    panel.innerHTML = '<div class="empty-msg">Domain not found in loaded data.</div>';
    return;
  }

  // Title + meta
  const title = document.createElement('div');
  title.className = 'domain-title';
  title.textContent = domain.name || domain.id || '(unnamed)';
  panel.appendChild(title);

  const meta = document.createElement('div');
  meta.className = 'domain-meta';
  if (domain.version) {
    const v = document.createElement('span');
    v.textContent = `v${domain.version}`;
    meta.appendChild(v);
  }
  (domain.tags || []).forEach(tag => {
    const pill = document.createElement('span');
    pill.className = 'tag';
    pill.textContent = tag;
    meta.appendChild(pill);
  });
  panel.appendChild(meta);

  if (domain.description) {
    const desc = document.createElement('div');
    desc.className = 'description';
    desc.textContent = domain.description;
    panel.appendChild(desc);
  }

  // ── Ubiquitous Language (with invariants + pattern) ──
  const lang = (domain.ubiquitous_language || []).filter(t => t && t.term);
  if (lang.length > 0) {
    const langWrap = document.createElement('div');
    lang.forEach(entry => {
      const row = document.createElement('div');
      row.style.cssText = 'padding:4px 0;border-bottom:1px solid #1e2d4a';
      let html = `<div style="display:flex;gap:8px"><span style="color:#f5c518;font-weight:600;min-width:30%;font-size:12px">${esc(entry.term)}</span><span style="color:#ccc;font-size:12px">${esc(entry.definition || '')}</span></div>`;
      if (entry.pattern) {
        html += `<div style="font-size:10px;color:#9b59b6;margin-top:2px">pattern: ${esc(entry.pattern)}</div>`;
      }
      const invs = (entry.invariants || []).filter(Boolean);
      if (invs.length > 0) {
        invs.forEach(inv => {
          html += `<div class="invariant">↳ ${esc(inv)}</div>`;
        });
      }
      row.innerHTML = html;
      langWrap.appendChild(row);
    });
    panel.appendChild(makeSection(`UBIQUITOUS LANGUAGE (${lang.length} terms)`, langWrap, false));
  }

  // ── Neighbors (all 5 types with details) ──
  function renderNeighborSection(items, label, cssClass, refKey, isNavigable) {
    if (!items || items.length === 0) return;
    const wrap = document.createElement('div');
    items.forEach(item => {
      const ref = typeof item === 'string' ? item : (item[refKey || 'ref'] || item.name || '');
      const id = stripPrefix(ref);
      const d = getDomain(id);
      const displayName = (d && d.name) || id || ref;
      const rel = (typeof item === 'object') ? (item.relationship || '') : '';
      const port = (typeof item === 'object') ? (item.via_port || '') : '';
      const source = (typeof item === 'object') ? (item.source || '') : '';
      const crossCut = (typeof item === 'object') ? item.is_cross_cutting : false;
      const abstraction = (typeof item === 'object') ? (item.abstraction || '') : '';
      const implNotes = (typeof item === 'object') ? (item.implementation_notes || '') : '';

      const row = document.createElement('div');
      row.className = 'neighbor-item';
      let html = `<span class="nb-type-label ${cssClass}">${label}</span>`;
      html += `<span class="nb-name" ${isNavigable && d ? `data-nav="${esc(id)}"` : 'style="cursor:default;color:#bbb"'}>${esc(displayName)}</span>`;
      if (rel) html += `<span class="nb-rel">${esc(rel)}</span>`;
      if (crossCut) html += `<span class="nb-rel" style="color:#e67e22">(cross-cutting)</span>`;
      if (source) html += `<span class="nb-rel">${esc(source)}</span>`;
      if (abstraction) html += `<span class="nb-rel">${esc(abstraction)}</span>`;
      if (port) html += `<span class="nb-port">${esc(port)}</span>`;
      if (implNotes) html += `<div style="font-size:11px;color:#666;width:100%;margin-top:2px">${esc(implNotes)}</div>`;
      row.innerHTML = html;

      const navEl = row.querySelector('[data-nav]');
      if (navEl) navEl.addEventListener('click', () => navigateTo(navEl.getAttribute('data-nav')));

      wrap.appendChild(row);
    });
    return wrap;
  }

  const clients = (domain.domain_clients || []).filter(Boolean);
  const subs = (domain.subdomains || []).filter(Boolean);
  const kernels = (domain.kernels || []).filter(Boolean);
  const adjacents = (domain.adjacents || []).filter(Boolean);
  const externals = (domain.externals || []).filter(Boolean);
  const totalNeighbors = clients.length + subs.length + kernels.length + adjacents.length + externals.length;

  if (totalNeighbors > 0) {
    const neighborsWrap = document.createElement('div');
    const cw = renderNeighborSection(clients, 'client', 'nb-client', 'ref', true);
    const sw = renderNeighborSection(subs, 'subdomain', 'nb-subdomain', 'ref', true);
    const kw = renderNeighborSection(kernels, 'kernel', 'nb-kernel', 'ref', false);
    const aw = renderNeighborSection(adjacents, 'adjacent', 'nb-adjacent', 'ref', true);
    const ew = renderNeighborSection(externals, 'external', 'nb-external', 'name', false);
    [cw, sw, kw, aw, ew].forEach(w => { if (w) neighborsWrap.appendChild(w); });
    panel.appendChild(makeSection(`NEIGHBORS (${totalNeighbors})`, neighborsWrap, false));
  }

  // ── Ports ──
  const ports = (domain._ports || []).filter(p => p && p.name);
  if (ports.length > 0) {
    const portsWrap = document.createElement('div');
    ports.forEach(p => {
      const item = document.createElement('div');
      item.className = 'port-item';
      let html = `<div class="port-header"><span class="port-dir ${p.type || ''}">${esc(p.type || '')}</span><span class="port-name">${esc(p.name)}</span></div>`;
      if (p.contract) html += `<div class="port-contract">${esc(p.contract)}</div>`;
      if (p.protocol) html += `<div class="port-protocol">protocol: ${esc(p.protocol)}</div>`;
      if (p.refs && p.refs.length) html += `<div class="port-refs">refs: ${p.refs.map(r => esc(r)).join(', ')}</div>`;
      item.innerHTML = html;
      portsWrap.appendChild(item);
    });
    panel.appendChild(makeSection(`PORTS (${ports.length})`, portsWrap, true));
  }

  // ── Events ──
  const events = (domain._events || []).filter(e => e && e.name);
  if (events.length > 0) {
    const eventsWrap = document.createElement('div');
    events.forEach(ev => {
      const item = document.createElement('div');
      item.className = 'event-item';
      let html = `<div class="event-name">${esc(ev.name)}</div>`;
      if (ev.triggers) html += `<div class="event-detail">triggers: ${esc(ev.triggers)}</div>`;
      if (ev.payload) html += `<div class="event-detail">payload: ${esc(ev.payload)}</div>`;
      item.innerHTML = html;
      eventsWrap.appendChild(item);
    });
    panel.appendChild(makeSection(`EVENTS (${events.length})`, eventsWrap, true));
  }

  // ── Rules ──
  const rules = (domain._rules || []).filter(Boolean);
  if (rules.length > 0) {
    const rulesWrap = document.createElement('div');
    rules.forEach(r => {
      const row = document.createElement('div');
      row.className = 'rule-item';
      row.textContent = typeof r === 'string' ? r : JSON.stringify(r);
      rulesWrap.appendChild(row);
    });
    panel.appendChild(makeSection(`RULES (${rules.length})`, rulesWrap, true));
  }

  // ── Issues (full detail) ──
  const issues = (domain.issues || []).filter(i => i && i.category);
  if (issues.length > 0) {
    const wrap = document.createElement('div');

    const counts = { critical: 0, high: 0, medium: 0, low: 0 };
    issues.forEach(i => { if (counts[i.severity] !== undefined) counts[i.severity]++; });

    const summary = document.createElement('div');
    summary.className = 'issue-summary';
    ['critical','high','medium','low'].forEach(sev => {
      if (counts[sev] > 0) {
        const badge = document.createElement('span');
        badge.className = `issue-badge badge-${sev}`;
        badge.textContent = `● ${counts[sev]} ${sev}`;
        summary.appendChild(badge);
      }
    });
    wrap.appendChild(summary);

    issues.forEach(iss => {
      const item = document.createElement('div');
      item.className = 'issue-item';
      let html = `<div class="issue-cat">${esc(iss.category || '')} | ${esc(iss.severity || '')}`;
      if (iss.ref) html += ` | ${esc(iss.ref)}`;
      html += `</div>`;
      if (iss.description) html += `<div class="issue-rec">${esc(iss.description)}</div>`;
      if (iss.recommendation) html += `<div style="color:#5cb85c;font-size:11px;margin-top:2px">→ ${esc(iss.recommendation)}</div>`;
      if (iss.evidence) html += `<div class="issue-ev">${esc(iss.evidence)}</div>`;
      if (iss.rationale) html += `<div class="issue-ev">${esc(iss.rationale)}</div>`;
      item.innerHTML = html;
      wrap.appendChild(item);
    });

    panel.appendChild(makeSection(`ISSUES (${issues.length})`, wrap, true));
  }

  // ── Code Locations (RDOD) ──
  const locs = (domain.code_locations || []).filter(l => l);
  if (locs.length > 0) {
    const locWrap = document.createElement('div');
    locs.forEach(loc => {
      const p = typeof loc === 'string' ? loc : (loc.path || '');
      const t = typeof loc === 'object' ? (loc.type || '') : '';
      const row = document.createElement('div');
      row.className = 'code-loc';
      row.innerHTML = `<span class="loc-path">${esc(p)}</span><span class="loc-type">${esc(t)}</span>`;
      locWrap.appendChild(row);
    });
    panel.appendChild(makeSection('CODE LOCATIONS', locWrap, false));
  }

  // ── Implementation Guidance (ddd-spec) ──
  const guide = domain.implementation_guidance;
  if (guide && (guide.suggested_type || guide.language_affinity || guide.notes)) {
    const guideWrap = document.createElement('div');
    if (guide.suggested_type) guideWrap.innerHTML += `<div class="guidance-row"><span class="guide-label">Type:</span><span class="guide-value">${esc(guide.suggested_type)}</span></div>`;
    if (guide.language_affinity) guideWrap.innerHTML += `<div class="guidance-row"><span class="guide-label">Language:</span><span class="guide-value">${esc(guide.language_affinity)}</span></div>`;
    if (guide.notes) guideWrap.innerHTML += `<div class="guidance-row"><span class="guide-label">Notes:</span><span class="guide-value">${esc(guide.notes)}</span></div>`;
    panel.appendChild(makeSection('IMPLEMENTATION GUIDANCE', guideWrap, false));
  }

  // ── Source Material (ddd-spec) ──
  const sources = (domain.source_material || []).filter(s => s && (s.type || s.reference));
  if (sources.length > 0) {
    const srcWrap = document.createElement('div');
    sources.forEach(s => {
      const row = document.createElement('div');
      row.className = 'source-item';
      row.innerHTML = `<span class="src-type">${esc(s.type || '')}</span><span class="src-ref">${esc(s.reference || '')}</span>`;
      srcWrap.appendChild(row);
    });
    panel.appendChild(makeSection(`SOURCE MATERIAL (${sources.length})`, srcWrap, true));
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────

function init() {
  const keys = Object.keys(RDOD_DATA);
  if (keys.length === 0) {
    document.getElementById('info-panel').innerHTML = '<div class="empty-msg">No domain data loaded.</div>';
    return;
  }
  renderSidebar();
  // Navigate to first domain (alphabetically)
  const firstKey = keys.sort()[0];
  navHistory = [];
  navigateTo(firstKey);
}

init();

// ── Drag Handles ──────────────────────────────────────────────────────────────

(function() {
  const sidebar = document.getElementById('sidebar');
  const sidebarHandle = document.getElementById('sidebar-handle');
  const cyEl = document.getElementById('cy');
  const graphHandle = document.getElementById('graph-handle');

  // Set initial graph height
  cyEl.style.height = Math.max(300, window.innerHeight * 0.55) + 'px';

  // ── Sidebar resize ──
  let dragSidebar = false;

  sidebarHandle.addEventListener('mousedown', e => {
    e.preventDefault();
    dragSidebar = true;
    sidebarHandle.classList.add('active');
    document.body.classList.add('dragging-col');
  });

  // ── Graph/info resize ──
  let dragGraph = false;
  let graphStartY = 0;
  let graphStartH = 0;

  graphHandle.addEventListener('mousedown', e => {
    e.preventDefault();
    dragGraph = true;
    graphStartY = e.clientY;
    graphStartH = cyEl.offsetHeight;
    graphHandle.classList.add('active');
    document.body.classList.add('dragging-row');
  });

  // ── Shared move/up ──
  document.addEventListener('mousemove', e => {
    if (dragSidebar) {
      const w = Math.max(120, Math.min(e.clientX, 600));
      sidebar.style.width = w + 'px';
    }
    if (dragGraph) {
      const newH = Math.max(100, graphStartH + (e.clientY - graphStartY));
      cyEl.style.height = newH + 'px';
      if (cy) cy.resize();
    }
  });

  document.addEventListener('mouseup', () => {
    if (dragSidebar) {
      dragSidebar = false;
      sidebarHandle.classList.remove('active');
      document.body.classList.remove('dragging-col');
    }
    if (dragGraph) {
      dragGraph = false;
      graphHandle.classList.remove('active');
      document.body.classList.remove('dragging-row');
      if (cy) cy.resize();
    }
  });
})();
</script>
