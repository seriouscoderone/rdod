# Formalized verification mappings for a domain.
# Maps natural-language invariants and contracts to machine-executable expressions.
# Consumed by external verification harnesses (property-based testing, SMT solvers, symbolic execution).
domain_ref: ""

# Formalized invariants from ubiquitous_language terms
properties: []
# - invariant: ""            # natural language invariant from domain.yaml
#   term: ""                 # which term this belongs to
#   technique: ""            # property-based | smt | symbolic
#   formal:
#     language: ""           # python | typescript | rust | z3 | dafny
#     expression: ""         # machine-executable expression
#   strategy: ""             # hypothesis strategy or input generator (property-based only)
#   notes: ""

# Formalized port contracts (pre/postconditions)
contracts: []
# - port_ref: ""             # port://<domain-id>/<direction>/<name>
#   preconditions:
#     - formal:
#         language: ""
#         expression: ""
#       description: ""
#   postconditions:
#     - formal:
#         language: ""
#         expression: ""
#       description: ""

# State machine specifications (for ordered/stateful domains)
state_machines: []
# - name: ""
#   term: ""                 # which term this models
#   states: []
#   transitions:
#     - from: ""
#       to: ""
#       trigger: ""
#       guard: ""
#   invariants: []
#   initial_state: ""
#   terminal_states: []

# Validation constraint graphs (optional — declarative ordering of validation steps)
# Expresses validation pipelines as DAGs with dependencies, enabling AIs to derive
# evaluation order, identify parallelizable branches, and compose constraints across domains.
validation_constraints: []
# - id: ""                  # unique constraint identifier (e.g., "C1_sigs_valid")
#   constraint: ""          # declarative rule — what must be true
#   depends_on: []          # list of constraint IDs that must be satisfied first
#   on_failure: ""          # what happens if this fails (escrow, reject, etc.)
